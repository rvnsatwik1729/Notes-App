<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes-App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">NoteSphere</h1>
                <div class="nav-buttons">
                    <a href="login.html" class="login-button">Login</a>
                    <a href="register.html" class="register-button">Register</a>
                </div>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h2>
                Capture your thoughts,
                organize your world
            </h2>

            <p>A simple and secure place for all your notes.</p>

            <button disabled>+ New Note</button>

        </section>

        <section class="empty-state">
            <div class="message">
                <h3>Login to create your notes</h3>
                <p>Your Personal work space is waiting</p>
            </div>
        </section>

        <section class="features">
            <div class="feature-card">Fast Search</div>
            <div class="feature-card">Secure Storage</div>
            <div class="feature-card">Beautiful Interface</div>
        </section>

    </main>
</body>
</html>
