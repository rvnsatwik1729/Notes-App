<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes-App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="background">
            <div class="circle one"></div>
            <div class="circle two"></div>
        </div>
        <nav class="navbar">
            <h1 class="logo">NoteSphere</h1>
                <div class="nav-buttons" id="nav-buttons">
                    <a href="login.html" class="login-button">Login</a>
                    <a href="register.html" class="register-button">Register</a>
                </div>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h2>
                Capture your thoughts,
                organize your world
            </h2>

            <p>A simple and secure place for all your notes.</p>

            <button id="new-note-btn" disabled>+ New Note</button>

        </section>

        <section class="empty-state" id="empty-state">
            <div class="message">
                <h3>Login to create your notes</h3>
                <p>Your Personal work space is waiting</p>
            </div>
        </section>

        <div class="search-box">
            <input 
                type="text"
                id="search-input"
                placeholder="🔍 Search your notes..."
            >
        </div>

        <section class="notes-container" id="notes-container">

        </section>

        <section class="note-modal" id="note-modal">
            <div class="modal-content">
                <h2>Create New Note</h2>

                <form id="note-form">
                    <input type="text" id="note-title" placeholder="Enter Title" required>
                    <textarea  id="note-content" placeholder="Write your note" required></textarea>
                    <div class="modal-buttons">
                        <button type="submit" id="save-button">Save</button>
                        <button id="close-modal" type="button">Cancel</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="features" id="features">
            <div class="feature-card">Fast Search</div>
            <div class="feature-card">Secure Storage</div>
            <div class="feature-card">Beautiful Interface</div>
        </section>
    </main>
    <script src="js/dashboard.js"></script>
</body>
</html>
